  # ── Backend API Server (Development) ────────────────────────────────────────
  backend:
    build:
      # context: ./server
      dockerfile: Dockerfile
      target: development
    container_name: chronicle-backend-dev
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb+srv://spdh427_db_user:X3Kg9f8ALdoHabWb@chronicle-mongodb-cluse.qzcxonc.mongodb.net/chronicle
      JWT_SECRET: dev_secret_key_min_64_chars_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      JWT_REFRESH_SECRET: dev_refresh_secret_key_min_64_chars_xxxxxxxxxxxxxxxxxxxxxxx
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      BCRYPT_ROUNDS: 4
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - mongodb
    networks:
      - chronicle-network-dev
    command: npm run dev

